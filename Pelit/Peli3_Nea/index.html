<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animal English Game</title>
  <link rel="stylesheet" href="../Peli3_Nea/style.css" />
</head>
<body>
  <div class="game-container">
    <h1>Learn English fun</h1>
    <p class="instruction">
      Valitse oikea eläin mikä kuvassa on.
    </p>

    <div class="score-box">
      <span>Score: </span>
      <span id="score">0</span>
    </div>

    <div class="animal-card">
      <div class="animal-image-area" id="animalImageArea">
        <!-- 
          LISÄÄ ELÄINKUVA TÄHÄN:
          JavaScript vaihtaa tähän eläimen kuvan.
          Jos et vielä lisää kuvia, näkyy emoji varalla.
        -->
        <img id="animalImage" src="" alt="Animal" class="animal-image hidden" />
         <div id="animalEmoji" class="animal-emoji">🐶</div>
      </div>
    </div>

    <div class="options" id="optionsContainer">
    </div>

    <p id="feedback" class="feedback"></p>

    <div class="buttons">
      <button id="nextButton">Seuraava</button>
      <button id="restartButton">Aloita uudelleen</button>
    </div>
  </div>

  <script src="../Peli3_Nea/code.js"></script>
</body>
</html>
